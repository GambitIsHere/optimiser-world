name = "optimiser-world-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Global variables
[vars]
ADMIN_KEY = "change-this-to-a-secure-key-in-production"

# Firecrawl API key should be set as a secret:
# wrangler secret put FIRECRAWL_API_KEY

[env.development]
vars = { ENVIRONMENT = "development", ADMIN_KEY = "dev-admin-key-12345" }

[env.production]
vars = { ENVIRONMENT = "production" }

[[d1_databases]]
binding = "DB"
database_name = "optimiser-db"
database_id = "placeholder-replace-with-real-id"

[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-replace-with-real-id"
preview_id = "placeholder-replace-with-real-preview-id"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "optimiser-assets"
preview_bucket_name = "optimiser-assets-preview"

[ai]
binding = "AI"

# Vectorize binding for semantic search indexing
[[vectorize]]
binding = "VECTORIZE"
index_name = "optimiser-items"

[[env.production.d1_databases]]
binding = "DB"
database_name = "optimiser-db-prod"
database_id = "placeholder-replace-with-real-prod-id"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "placeholder-replace-with-real-prod-id"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "optimiser-assets-prod"

# Cron triggers for automatic scraping and learning
[triggers]
crons = [
  "0 */6 * * *",    # Every 6 hours — standard discovery scrape
  "0 0 * * 0",      # Weekly (Sunday midnight UTC) — full deep scrape
  "0 2 * * *"       # Daily 2am UTC — learning cycle (compress observations → insights)
]
